<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>警情案件处罚查询与统计明细</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .detail-container {
            padding: 10px 10px 26px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .btn-export {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            position: relative;
        }

        .export-wrapper {
            position: relative;
            display: inline-block;
        }

        .export-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 38px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            min-width: 120px;
        }

        .export-menu button {
            width: 100%;
            padding: 8px 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            text-align: left;
            font-size: 13px;
        }

        .export-menu button:hover {
            background: #f5f5f5;
        }

        .export-menu.open {
            display: block;
        }

        .results-table-container {
            overflow-x: auto;
            width: 100%;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            min-width: 100%;
        }

        .results-table th,
        .results-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            white-space: nowrap;
            font-size: 13px;
            height: 36px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .results-table th {
            background-color: #f8f9fa;
            font-weight: bold;
            color: #333;
            position: sticky;
            top: 0;
        }

        .results-table tr:nth-child(even) {
            background-color: #fafafa;
        }

        .results-table tr:hover {
            background-color: #e3f2fd;
        }

        .status-message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }

        .status-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .horizontal-scroll {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 12px;
            overflow-x: auto;
            overflow-y: hidden;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            z-index: 2000;
        }

        .horizontal-scroll-inner {
            height: 1px;
        }
    </style>
</head>
<body>
    <div id="detail-page" class="detail-container">
        <div class="detail-header">
            <h3 style="margin: 0;" id="detailTitle">明细数据</h3>
            <div class="export-wrapper">
                <button class="btn-export" type="button" id="exportBtn">导出</button>
                <div class="export-menu" id="exportMenu">
                    <button type="button" onclick="exportDetailData('excel')">excel</button>
                    <button type="button" onclick="exportDetailData('csv')">csv</button>
                </div>
            </div>
        </div>

        <div id="detailStatus" class="status-message" style="display: none;"></div>

        <div id="detailResults">
            <p style="text-align: center; color: #666; padding: 30px;">
                正在加载明细数据...
            </p>
        </div>
    </div>

    <div id="detailScroll" class="horizontal-scroll">
        <div id="detailScrollInner" class="horizontal-scroll-inner"></div>
    </div>

    <script src="{{ url_for('static', filename='js/jqajcfcxytj_detail.js') }}"></script>
</body>
</html>
