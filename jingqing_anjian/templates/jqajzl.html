<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>警情案件总览</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .jqajzl-container {
            padding: 10px;
        }

        .filter-container {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-weight: bold;
            color: #333;
        }

        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .multi-select {
            position: relative;
        }

        .multi-select-display {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
            min-height: 34px;
            display: flex;
            align-items: center;
        }

        .multi-select-dropdown {
            display: none;
            position: absolute;
            top: 38px;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            padding: 6px 8px;
        }

        .multi-select-dropdown.open {
            display: block;
        }

        .multi-select-option {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 2px;
            font-size: 13px;
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-search {
            background: #1976d2;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-search:hover {
            background: #1565c0;
        }

        .btn-export {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            position: relative;
        }

        .export-wrapper {
            position: relative;
            display: inline-block;
        }

        .export-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 38px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            min-width: 120px;
        }

        .export-menu button {
            width: 100%;
            padding: 8px 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            text-align: left;
            font-size: 13px;
        }

        .export-menu button:hover {
            background: #f5f5f5;
        }

        .export-wrapper:hover .export-menu {
            display: block;
        }

        .results-table-container {
            overflow-x: auto;
            width: 100%;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            min-width: 100%;
        }

        .results-table th,
        .results-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            white-space: nowrap;
            font-size: 13px;
            height: 36px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .results-table th {
            background-color: #f8f9fa;
            font-weight: bold;
            color: #333;
            position: sticky;
            top: 0;
        }

        .results-table tr:nth-child(even) {
            background-color: #fafafa;
        }

        .results-table .total-row {
            background-color: #e8f5e8 !important;
            font-weight: bold;
        }

        .jqajzl-link {
            color: #1976d2;
            text-decoration: underline;
            cursor: pointer;
        }

        .status-message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }

        .status-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #fff;
            width: 92%;
            max-width: 1200px;
            height: 85%;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            resize: both;
            overflow: auto;
            position: relative;
        }

        .modal-header {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header button {
            background: #757575;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .modal-body {
            flex: 1;
            padding: 0;
        }

        #jqajzlDetailFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-resize-bar {
            height: 10px;
            background: #f0f0f0;
            cursor: ew-resize;
        }
    </style>
</head>
<body>
    <div id="jqajzl-page" class="jqajzl-container">
        <div class="card">
            <h3>警情案件总览 - 查询条件</h3>
            <div class="filter-container">
                <div class="filter-group">
                    <label for="jqajzlCaseTypes">警情案件类型</label>
                    <div class="multi-select" id="jqajzlCaseTypes">
                        <div class="multi-select-display" id="jqajzlCaseTypesDisplay">全部类型</div>
                        <div class="multi-select-dropdown" id="jqajzlCaseTypesDropdown"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <label>报警时间</label>
                    <div>
                        <label for="jqajzlStartTime" style="font-size: 12px; font-weight: normal;">开始时间</label>
                        <input type="datetime-local" id="jqajzlStartTime" step="1">
                    </div>
                    <div style="margin-top: 6px;">
                        <label for="jqajzlEndTime" style="font-size: 12px; font-weight: normal;">结束时间</label>
                        <input type="datetime-local" id="jqajzlEndTime" step="1">
                    </div>
                </div>
                <div class="filter-group">
                    <label style="visibility: hidden;">操作</label>
                    <div class="filter-actions">
                        <button class="btn-search" onclick="searchJqajzl()">查询</button>
                        <div class="export-wrapper">
                            <button class="btn-export" type="button">导出</button>
                            <div class="export-menu">
                                <button type="button" onclick="exportJqajzl('excel')">excel</button>
                                <button type="button" onclick="exportJqajzl('csv')">csv</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="jqajzlStatus" class="status-message" style="display: none;"></div>

        <div class="card">
            <h3>警情案件总览 - 汇总结果</h3>
            <div id="jqajzlResults">
                <p style="text-align: center; color: #666; padding: 30px;">
                    请选择条件并点击“查询”
                </p>
            </div>
        </div>
    </div>

    <div id="jqajzlModal" class="modal" onclick="closeJqajzlModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <strong>警情案件总览明细</strong>
                <button type="button" onclick="closeJqajzlModal()">关闭</button>
            </div>
            <div class="modal-body">
                <iframe id="jqajzlDetailFrame" title="警情案件总览明细"></iframe>
            </div>
            <div class="modal-resize-bar" id="jqajzlResizeBar"></div>
        </div>
    </div>

    <script>
        {% include 'main_jqajzl.js' %}
    </script>
</body>
</html>
