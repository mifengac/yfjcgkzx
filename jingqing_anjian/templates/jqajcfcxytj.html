<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>警情案件处罚查询与统计</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .jqajcfcxytj-container {
            padding: 10px;
        }

        .filter-container {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-weight: bold;
            color: #333;
            white-space: nowrap;
        }

        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .multi-select {
            position: relative;
        }

        .multi-select-display {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
            min-height: 34px;
            display: flex;
            align-items: center;
            min-width: 200px;
        }

        .multi-select-dropdown {
            display: none;
            position: absolute;
            top: 38px;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            padding: 6px 8px;
        }

        .multi-select-dropdown.open {
            display: block;
        }

        .multi-select-option {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 2px;
            font-size: 13px;
        }

        .btn-search {
            background: #1976d2;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-search:hover {
            background: #1565c0;
        }

        .btn-report {
            background: #ff9800;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-report:hover {
            background: #fb8c00;
        }

        .btn-export {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            position: relative;
        }

        .export-wrapper {
            position: relative;
            display: inline-block;
        }

        .export-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 38px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            min-width: 120px;
        }

        .export-menu button {
            width: 100%;
            padding: 8px 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            text-align: left;
            font-size: 13px;
        }

        .export-menu button:hover {
            background: #f5f5f5;
        }

        .export-wrapper:hover .export-menu {
            display: block;
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .results-table-container {
            overflow-x: auto;
            width: 100%;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            min-width: 100%;
        }

        .results-table th,
        .results-table td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            white-space: nowrap;
            font-size: 13px;
            height: 36px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .results-table th:first-child,
        .results-table td:first-child {
            text-align: left;
            position: sticky;
            left: 0;
            background: inherit;
            z-index: 10;
        }

        .results-table th:first-child {
            background-color: #f8f9fa;
            z-index: 20;
        }

        .results-table th {
            background-color: #f8f9fa;
            font-weight: bold;
            color: #333;
            position: sticky;
            top: 0;
        }

        .results-table tbody tr:nth-child(even) {
            background-color: #fafafa;
        }

        .results-table tbody tr:hover {
            background-color: #e3f2fd;
        }

        .clickable-cell {
            color: #1976d2;
            cursor: pointer;
            text-decoration: underline;
        }

        .clickable-cell:hover {
            color: #0d47a1;
        }

        .results-table .total-row {
            background-color: #e8f5e8 !important;
            font-weight: bold;
            border-top: 2px solid #4caf50;
        }

        .results-table .total-row td {
            color: #2e7d32;
            font-weight: bold;
        }

        .results-table .total-row td:first-child {
            background-color: #4caf50;
            color: white;
        }

        .status-message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }

        .status-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #fff;
            width: 92%;
            max-width: 1400px;
            height: 85%;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .modal-header {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            margin: 0;
        }

        .modal-header button {
            background: #757575;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .modal-body {
            flex: 1;
            padding: 0;
            overflow: hidden;
        }

        #detailFrame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="jqajcfcxytj-page" class="jqajcfcxytj-container">
        <div class="card">
            <h3>警情案件处罚查询与统计 - 筛选条件</h3>
            <div class="filter-container">
                <div class="filter-group">
                    <label for="caseTypes">警情类型:</label>
                    <div class="multi-select" id="caseTypes">
                        <div class="multi-select-display" id="caseTypesDisplay">请选择警情类型</div>
                        <div class="multi-select-dropdown" id="caseTypesDropdown"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <label for="startTime">开始时间:</label>
                    <input type="datetime-local" id="startTime" step="1">
                </div>
                <div class="filter-group">
                    <label for="endTime">结束时间:</label>
                    <input type="datetime-local" id="endTime" step="1">
                </div>
                <div class="filter-group">
                    <label for="hbStartTime">环比开始:</label>
                    <input type="datetime-local" id="hbStartTime" step="1">
                </div>
                <div class="filter-group">
                    <label for="hbEndTime">环比结束:</label>
                    <input type="datetime-local" id="hbEndTime" step="1">
                </div>
                <div class="filter-group">
                    <button class="btn-search" onclick="searchData()">查询</button>
                </div>
                <div class="filter-group">
                    <button class="btn-report" onclick="exportReport()">导出报表</button>
                </div>
            </div>
        </div>

        <div id="statusMessage" class="status-message" style="display: none;"></div>

        <div class="card">
            <div class="results-header">
                <h3>警情案件处罚查询与统计 - 数据显示</h3>
                <div class="export-wrapper">
                    <button class="btn-export" type="button">导出</button>
                    <div class="export-menu">
                        <button type="button" onclick="exportData('excel')">excel</button>
                        <button type="button" onclick="exportData('csv')">csv</button>
                    </div>
                </div>
            </div>
            <div id="resultsContainer">
                <p style="text-align: center; color: #666; padding: 30px;">
                    请选择条件并点击"查询"
                </p>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>明细数据</h3>
                <button type="button" onclick="closeModal()">关闭</button>
            </div>
            <div class="modal-body">
                <iframe id="detailFrame" title="明细数据"></iframe>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/jqajcfcxytj.js') }}"></script>
</body>
</html>
