<section class="jszahz-topic" id="jszahzTopicApp">
    <div class="jszahz-topic-upload-overlay jszahz-topic-hidden" id="jszahzTopicUploadOverlay">
        <div class="jszahz-topic-upload-overlay-card">
            <div class="jszahz-topic-drawer-spinner" aria-hidden="true"></div>
            <div class="jszahz-topic-upload-overlay-title" id="jszahzTopicUploadOverlayTitle">正在处理上传...</div>
            <div class="jszahz-topic-upload-overlay-detail" id="jszahzTopicUploadOverlayDetail"></div>
        </div>
    </div>
    <div class="jszahz-topic-toolbar">
        <div class="jszahz-topic-batch" id="jszahzTopicBatchInfo">当前未上传基础/标签 Excel，查询时仅使用列管数据源。</div>
        <div class="jszahz-topic-upload-stack">
            <div class="jszahz-topic-upload-group">
                <span class="jszahz-topic-upload-label">基础数据</span>
                <input type="file" id="jszahzTopicBaseFile" accept=".xlsx,.xlsm">
                <button type="button" class="module-button" id="jszahzTopicBaseUploadBtn">上传基础 Excel</button>
            </div>
            <div class="jszahz-topic-upload-group">
                <span class="jszahz-topic-upload-label">标签数据</span>
                <input type="file" id="jszahzTopicTagFile" accept=".xlsx,.xlsm">
                <button type="button" class="module-button" id="jszahzTopicTagUploadBtn">上传标签 Excel</button>
            </div>
        </div>
    </div>

    <section class="filter-form">
        <div class="filter-row">
            <div class="filter-group">
                <label for="jszahzTopicManagedOnly">列管</label>
                <label class="jszahz-topic-check">
                    <input id="jszahzTopicManagedOnly" type="checkbox" checked>
                    <span>仅看已列管人员</span>
                </label>
            </div>
            <div class="filter-group">
                <label>分局</label>
                <div class="multi-select-box" id="jszahzTopicBranchDisplay"><span>全部</span></div>
                <div class="multi-select-menu" id="jszahzTopicBranchMenu"></div>
            </div>
            <div class="filter-group">
                <label>人员类型</label>
                <div class="multi-select-box" id="jszahzTopicTypeDisplay"><span>全部</span></div>
                <div class="multi-select-menu" id="jszahzTopicTypeMenu"></div>
            </div>
            <div class="filter-group">
                <label>人员风险</label>
                <div class="multi-select-box" id="jszahzTopicRiskDisplay"><span>全部</span></div>
                <div class="multi-select-menu" id="jszahzTopicRiskMenu"></div>
            </div>
            <div class="filter-group jszahz-topic-actions">
                <button type="button" class="module-button" id="jszahzTopicQueryBtn">查询</button>
                <button type="button" class="module-button secondary" id="jszahzTopicExportBtn">导出</button>
            </div>
        </div>
        <div class="jszahz-topic-tip" id="jszahzTopicStatus">页面已初始化，等待查询。</div>
        <div class="error-message jszahz-topic-hidden" id="jszahzTopicError"></div>
    </section>

    <section class="results-header">
        <div class="results-info" id="jszahzTopicSummary">未查询</div>
    </section>

    <div class="results-table-container">
        <table class="jszahz-topic-table" id="jszahzTopicTable">
            <thead>
                <tr>
                    <th>分局代码</th>
                    <th>分局名称</th>
                    <th>去重患者数</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="3" class="no-data">初始化不展示数据，请点击查询。基础/标签 Excel 为可选增强数据源。</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="jszahz-topic-drawer" id="jszahzTopicDrawer">
        <div class="jszahz-topic-drawer-mask" id="jszahzTopicDrawerMask"></div>
        <div class="jszahz-topic-drawer-panel" id="jszahzTopicDrawerPanel">
            <div class="jszahz-topic-drawer-head">
                <div>
                    <div class="jszahz-topic-drawer-title" id="jszahzTopicDrawerTitle">详细数据</div>
                    <div class="jszahz-topic-drawer-subtitle">按身份证号去重展示</div>
                </div>
                <button type="button" class="module-button secondary" id="jszahzTopicDrawerCloseBtn">关闭</button>
            </div>
            <div class="jszahz-topic-drawer-body">
                <div class="jszahz-topic-drawer-loading jszahz-topic-hidden" id="jszahzTopicDrawerLoading">
                    <div class="jszahz-topic-drawer-loading-card">
                        <div class="jszahz-topic-drawer-spinner" aria-hidden="true"></div>
                        <div class="jszahz-topic-drawer-loading-title" id="jszahzTopicDrawerLoadingTitle">正在查询详细数据及关联统计，请稍候...</div>
                        <div class="jszahz-topic-drawer-loading-hint" id="jszahzTopicDrawerLoadingHint">当前会按身份证号去重加载明细，并统计 7 类关联数据</div>
                    </div>
                </div>
                <iframe id="jszahzTopicDrawerFrame" title="精神患者主题库详细数据"></iframe>
            </div>
        </div>
    </div>
</section>
