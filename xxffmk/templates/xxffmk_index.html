<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ module_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/water.css') }}">
    <style>
        body {
            margin: 0;
            background: #f3f6fb;
            min-height: 100vh;
            width: 100vw;
        }
        .page-shell {
            width: 100%;
            min-height: 100vh;
            padding: 0;
            box-sizing: border-box;
        }
        .page-card {
            background: #fff;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            width: 100%;
            min-height: 100vh;
        }
        .page-card-body {
            padding: 20px;
        }
        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 20px 0;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-bar h1 {
            margin: 0;
            font-size: 28px;
        }
        .header-actions a {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 6px;
            text-decoration: none;
            color: #fff;
            margin-left: 10px;
        }
        .header-actions a:first-child {
            margin-left: 0;
            background: #1976d2;
        }
        .header-actions a:last-child {
            background: #e53935;
        }
        .tab-nav {
            display: flex;
            gap: 10px;
            padding: 18px 20px 0;
            border-bottom: 1px solid #e5e7eb;
            background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
        }
        .tab-btn {
            border: none;
            background: #1976d2;
            color: #fff;
            padding: 10px 18px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
        }
        .query-area {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: end;
            padding: 18px;
            margin-bottom: 18px;
            background: #f8fbff;
            border: 1px solid #dbe7f3;
            border-radius: 10px;
        }
        .query-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 220px;
        }
        .query-item label {
            font-size: 13px;
            color: #475569;
            font-weight: 600;
        }
        .query-item input {
            min-height: 38px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 0 10px;
            font-size: 14px;
            background: #fff;
        }
        .query-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .module-button {
            min-height: 38px;
            padding: 0 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #1976d2;
            color: #fff;
            font-weight: 600;
        }
        .module-button.secondary {
            background: #475569;
        }
        .status-text {
            font-size: 13px;
            color: #64748b;
        }
        .layout-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 18px;
        }
        .panel {
            background: #fff;
            border: 1px solid #dbe7f3;
            border-radius: 10px;
            padding: 16px;
            min-height: 200px;
        }
        .panel h2 {
            margin: 0 0 12px;
            font-size: 18px;
        }
        .panel-subtitle {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .table-shell {
            overflow: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
        }
        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid #eef2f7;
            text-align: left;
            font-size: 13px;
            vertical-align: top;
        }
        th {
            background: #f8fafc;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        tr:hover td {
            background: #f8fbff;
        }
        .link-button {
            border: none;
            background: transparent;
            color: #1976d2;
            cursor: pointer;
            padding: 0;
            font-weight: 600;
        }
        .score-badge {
            display: inline-block;
            min-width: 40px;
            text-align: center;
            padding: 4px 8px;
            border-radius: 999px;
            background: #e3f2fd;
            color: #0f4c81;
            font-weight: 700;
        }
        .summary-box {
            margin-top: 12px;
            padding: 12px;
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
        }
        .summary-box h3 {
            margin: 0 0 8px;
            font-size: 14px;
        }
        .pill-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pill {
            padding: 4px 10px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            font-size: 12px;
        }
        .empty-state {
            color: #94a3b8;
            font-size: 13px;
            padding: 20px 0;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .pagination button {
            min-height: 34px;
            padding: 0 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
        }
        .pagination button:disabled {
            cursor: not-allowed;
            color: #94a3b8;
        }
        @media (max-width: 1100px) {
            .layout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="page-shell">
    <div class="page-card">
        <header class="header-bar">
            <div>
                <h1>{{ module_name }}</h1>
            </div>
            <div class="header-actions">
                <a href="/">返回首页</a>
                <a href="{{ url_for('logout') }}">退出登录</a>
            </div>
        </header>

        <div class="tab-nav">
            <button type="button" class="tab-btn">情况复杂学校赋分</button>
        </div>

        <div class="page-card-body">
            <section class="query-area">
                <div class="query-item">
                    <label for="beginDate">开始时间</label>
                    <input type="datetime-local" step="1" id="beginDate" value="{{ start_time.replace(' ', 'T') }}">
                </div>
                <div class="query-item">
                    <label for="endDate">结束时间</label>
                    <input type="datetime-local" step="1" id="endDate" value="{{ end_time.replace(' ', 'T') }}">
                </div>
                <div class="query-item" style="min-width: 140px;">
                    <label for="limit">显示排名数</label>
                    <input type="number" id="limit" min="1" max="100" value="10">
                </div>
                <div class="query-actions">
                    <button type="button" class="module-button" id="queryBtn">查询</button>
                    <button type="button" class="module-button secondary" id="resetBtn">重置</button>
                    <button type="button" class="module-button secondary" id="refreshBtn">刷新数据</button>
                    <span class="status-text" id="statusText">准备就绪</span>
                </div>
            </section>

            <section class="layout-grid">
                <div class="panel">
                    <h2>学校总榜</h2>
                    <div class="panel-subtitle">默认展示学校和总分，点击学校查看 5 个维度得分。</div>
                    <div class="table-shell" id="rankingTableShell"></div>
                    <div class="summary-box">
                        <h3>未匹配学校摘要</h3>
                        <div id="unmatchedSummary" class="empty-state">暂无未匹配数据</div>
                    </div>
                </div>

                <div class="panel">
                    <h2>学校维度得分</h2>
                    <div class="panel-subtitle" id="schoolDetailSubtitle">点击左侧学校后显示各维度原始值、名次和得分。</div>
                    <div class="table-shell" id="schoolDetailTableShell"></div>
                </div>

                <div class="panel full-width">
                    <h2>维度明细</h2>
                    <div class="panel-subtitle" id="dimensionDetailSubtitle">点击“学校维度得分”中的维度查看具体明细。</div>
                    <div class="table-shell" id="dimensionDetailTableShell"></div>
                    <div class="pagination" id="dimensionPagination" style="display:none;">
                        <span id="dimensionPaginationMeta"></span>
                        <div>
                            <button type="button" id="prevPageBtn">上一页</button>
                            <button type="button" id="nextPageBtn">下一页</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>

<script>
    window.XXFFMK_DEFAULTS = {
        beginDate: "{{ start_time.replace(' ', 'T') }}",
        endDate: "{{ end_time.replace(' ', 'T') }}"
    };
</script>
<script src="{{ url_for('xxffmk.static', filename='js/xxffmk.js') }}"></script>
</body>
</html>
