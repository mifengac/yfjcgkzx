<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* 简单登录页样式，便于离线部署使用 */
        .login-container { max-width: 360px; margin: 8vh auto; padding: 24px; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .login-container h2 { margin: 0 0 16px; text-align: center; }
        .login-container label { display: block; margin: 12px 0 6px; }
        .login-container input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; }
        .login-container button { margin-top: 16px; width: 100%; padding: 10px; background: #1976d2; color:#fff; border: none; border-radius: 4px; cursor: pointer; }
        .login-container button:hover { background:#125ea3; }
        .error { color:#c62828; margin-top:8px; text-align:center; }
        .msg { color:#e65100; margin-top:8px; text-align:center; }
    </style>
    <!-- 所有代码使用简体中文注释 -->
    <!-- 登录页：输入用户名和密码，提交到 /login 进行校验 -->
    <!-- 密码在数据库中使用Werkzeug哈希加密存储 -->
  </head>
<body>
    <div class="login-container">
        <h2>系统登录</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="msg">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}
        <form action="{{ url_for('login') }}" method="post">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required>
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">登录</button>
        </form>
    </div>
</body>
</html>
