<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .topbar { display:flex; justify-content: space-between; align-items:center; }
    .btn { background:#1976d2; color:#fff; padding:8px 12px; border:none; border-radius:4px; cursor:pointer; text-decoration:none; }
    .btn:hover { background:#125ea3; }

    /* 表格美化（明细较宽，提供滚动和粘性表头与首列） */
    .results-table-container { overflow:auto; max-height: 76vh; }
    .results-table { width:100%; border-collapse: separate; border-spacing: 0; background:#fff; }
    .results-table thead th { position: sticky; top:0; z-index: 2; background:#f6f8fb; color:#2c3e50; font-weight:600; padding:10px 12px; border-bottom:2px solid #e3e7ef; }
    .results-table tbody td { padding:10px 12px; border-bottom:1px solid #eef2f7; }
    .results-table tbody tr:hover { background:#fafcff; }
    .results-table thead th:first-child { left:0; position: sticky; z-index:3; }
    .results-table tbody td:first-child { left:0; position: sticky; background:#fff; z-index:1; }
    /* 长文本提升可读性 */
    .results-table td { max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .results-table td:hover { white-space: normal; }
  </style>
  <!-- 人员与地区明细列表页 -->
  <!-- 点击首页“任务名”或地区数量后跳入本页，支持CSV下载 -->
  <!-- 列顺序根据返回数据的键顺序显示 -->
</head>
<body>
  <header class="header">
    <h1>{{ title }}</h1>
  </header>

  <main class="container">
    <div class="card">
      <div class="topbar">
        <div>
          <a class="btn" href="{{ url_for('main') }}" style="background:#546e7a;">返回主页</a>
          <a class="btn" href="{{ url_for('zhizong.task_rows_download', task_id=task['id'], dwdm=dwdm) }}">下载CSV</a>
          <a class="btn" href="{{ url_for('zhizong.index') }}">返回首页</a>
        </div>
      </div>
      <div class="results-table-container" style="margin-top:12px;">
        <table class="results-table">
          <thead>
            <tr>
              {% if rows and rows[0] %}
                {% for key in rows[0].keys() %}
                  <th>{{ key }}</th>
                {% endfor %}
              {% else %}
                <th>无数据</th>
              {% endif %}
            </tr>
          </thead>
          <tbody>
            {% for r in rows %}
              <tr>
                {% for key, value in r.items() %}
                  <td>{{ value }}</td>
                {% endfor %}
              </tr>
            {% endfor %}
          </tbody>
        </table>
        {% if not rows %}
          <p style="text-align:center; color:#666; padding:24px;">暂无数据</p>
        {% endif %}
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2025 治综平台数据统计</p>
  </footer>
</body>
</html>
