<link rel="stylesheet" href="{{ url_for('static', filename='css/water.css') }}">

<section class="card" style="margin-top:12px;">
    <h2 style="margin:0 0 12px 0;">未成年人9类标签碰撞</h2>
    <div class="row" style="gap:10px; align-items:flex-end; flex-wrap:wrap;">
        <label>
            上传文件(xlsx/csv)
            <input type="file" id="wcnr9lbqFile" accept=".xlsx,.csv">
        </label>
        <label>
            身份证列名
            <input type="text" id="wcnr9lbqColumn" value="证件号码" placeholder="例如: 证件号码">
        </label>
        <button class="btn" id="wcnr9lbqQueryBtn" type="button">查询</button>
        <button class="btn" id="wcnr9lbqTplBtn" type="button">下载模板</button>
    </div>
    <div class="row" style="gap:10px; margin-top:10px; align-items:center; flex-wrap:wrap;">
        <label>
            每页条数
            <select id="wcnr9lbqPageSize">
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="all">全部</option>
            </select>
        </label>
        <button class="btn" id="wcnr9lbqPrevBtn" type="button">上一页</button>
        <button class="btn" id="wcnr9lbqNextBtn" type="button">下一页</button>
        <span class="muted" id="wcnr9lbqPageInfo"></span>
    </div>
    <div class="muted" id="wcnr9lbqStatus" style="margin-top:8px;"></div>
    <div class="err" id="wcnr9lbqErr" style="margin-top:8px;"></div>
</section>

<section class="card">
    <div class="table-head">
        <h3 style="margin:0;">数据列表</h3>
        <div class="export-wrap" id="wcnr9lbqExportWrap">
            <button class="btn" id="wcnr9lbqExportBtn" type="button">导出</button>
            <div class="export-menu" id="wcnr9lbqExportMenu">
                <button class="btn" id="wcnr9lbqExportXlsxBtn" type="button">xlsx</button>
                <button class="btn" id="wcnr9lbqExportCsvBtn" type="button">csv</button>
            </div>
        </div>
    </div>
    <div class="table-wrap">
        <table id="wcnr9lbqTbl"></table>
    </div>
</section>

<style>
    body {
        max-width: none !important;
        width: calc(100vw - 24px);
        margin: 12px auto !important;
        padding: 0 6px !important;
    }

    .card {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        background: var(--background-alt);
    }

    .row {
        display: flex;
    }

    .table-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }

    .table-wrap {
        overflow: auto;
    }

    .muted {
        color: var(--text-muted);
    }

    .err {
        color: #c62828;
    }

    .export-wrap {
        position: relative;
    }

    .export-menu {
        display: none;
        position: absolute;
        right: 0;
        top: calc(100% + 4px);
        min-width: 110px;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--background-body);
        z-index: 20;
    }

    .export-menu.show {
        display: block;
    }

    .export-menu .btn {
        display: block;
        width: 100%;
        margin: 0 0 6px 0;
        text-transform: uppercase;
    }

    .export-menu .btn:last-child {
        margin-bottom: 0;
    }

    #wcnr9lbqTbl th {
        text-align: center;
    }

    #wcnr9lbqTbl {
        table-layout: auto;
    }

    #wcnr9lbqTbl td {
        text-align: left;
        white-space: normal;
        word-break: break-all;
    }

    #wcnr9lbqTbl td.num-cell {
        text-align: center;
    }
</style>

<script>
    (function () {
        const fileEl = document.getElementById("wcnr9lbqFile");
        const colEl = document.getElementById("wcnr9lbqColumn");
        const queryBtn = document.getElementById("wcnr9lbqQueryBtn");
        const statusEl = document.getElementById("wcnr9lbqStatus");
        const errEl = document.getElementById("wcnr9lbqErr");
        const tbl = document.getElementById("wcnr9lbqTbl");
        const pageSizeEl = document.getElementById("wcnr9lbqPageSize");
        const prevBtn = document.getElementById("wcnr9lbqPrevBtn");
        const nextBtn = document.getElementById("wcnr9lbqNextBtn");
        const pageInfoEl = document.getElementById("wcnr9lbqPageInfo");
        const tplBtn = document.getElementById("wcnr9lbqTplBtn");
        const exportWrap = document.getElementById("wcnr9lbqExportWrap");
        const exportBtn = document.getElementById("wcnr9lbqExportBtn");
        const exportMenu = document.getElementById("wcnr9lbqExportMenu");
        const exportXlsxBtn = document.getElementById("wcnr9lbqExportXlsxBtn");
        const exportCsvBtn = document.getElementById("wcnr9lbqExportCsvBtn");

        let allRows = [];
        let currentPage = 1;

        function getPageSize() {
            const v = String(pageSizeEl.value || "20");
            if (v === "all") return null;
            const n = Number(v);
            if (!Number.isFinite(n) || n <= 0) return 20;
            return n;
        }

        function parseDownloadName(contentDisposition, fallbackName) {
            if (!contentDisposition) return fallbackName;
            const utf8Match = contentDisposition.match(/filename\*=UTF-8''([^;]+)/i);
            if (utf8Match && utf8Match[1]) {
                return decodeURIComponent(utf8Match[1]);
            }
            const normalMatch = contentDisposition.match(/filename="?([^";]+)"?/i);
            if (normalMatch && normalMatch[1]) {
                return normalMatch[1];
            }
            return fallbackName;
        }

        function renderTable() {
            const total = allRows.length;
            const pageSize = getPageSize();
            let totalPages = 1;
            let pageRows = allRows;

            if (pageSize != null) {
                totalPages = Math.max(1, Math.ceil(total / pageSize));
                if (currentPage > totalPages) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;
                const start = (currentPage - 1) * pageSize;
                pageRows = allRows.slice(start, start + pageSize);
            } else {
                currentPage = 1;
                totalPages = 1;
                pageRows = allRows;
            }

            prevBtn.disabled = currentPage <= 1 || total === 0;
            nextBtn.disabled = currentPage >= totalPages || total === 0;
            pageInfoEl.textContent = `第 ${currentPage}/${totalPages} 页，共 ${total} 条`;

            if (!pageRows.length) {
                tbl.innerHTML = `<thead><tr><th>无数据</th></tr></thead><tbody><tr><td class="muted">无数据</td></tr></tbody>`;
                return;
            }

            const headers = Object.keys(pageRows[0]);
            const orderedHeaders = buildDisplayHeaders(headers);
            const head = `<thead><tr>${orderedHeaders.map(h => `<th>${h}</th>`).join("")}</tr></thead>`;
            const body = pageRows.map(r => {
                const tds = orderedHeaders.map(h => {
                    const v = r[h] == null ? "" : String(r[h]);
                    return `<td>${v}</td>`;
                }).join("");
                return `<tr>${tds}</tr>`;
            }).join("");
            tbl.innerHTML = `${head}<tbody>${body}</tbody>`;
        }

        function buildDisplayHeaders(headers) {
            let ordered = headers.slice();

            if (ordered.includes("证件号码")) {
                ordered = ["证件号码", ...ordered.filter(h => h !== "证件号码")];
            }

            const afterLogoutTimeCols = ["所属市局", "所属市局代码", "所属分局", "所属分局代码"];
            const hasLogoutTime = ordered.includes("户籍注销时间");
            if (!hasLogoutTime) {
                return ordered;
            }

            ordered = ordered.filter(h => !afterLogoutTimeCols.includes(h));
            const logoutIdx = ordered.indexOf("户籍注销时间");
            const insertCols = afterLogoutTimeCols.filter(h => headers.includes(h));

            return [
                ...ordered.slice(0, logoutIdx + 1),
                ...insertCols,
                ...ordered.slice(logoutIdx + 1),
            ];
        }

        async function exportResult(fmt) {
            errEl.textContent = "";

            const file = fileEl.files && fileEl.files[0];
            const columnName = String(colEl.value || "").trim();
            if (!file) {
                errEl.textContent = "请先上传文件";
                return;
            }
            if (!columnName) {
                errEl.textContent = "请输入身份证列名";
                return;
            }

            exportBtn.disabled = true;
            exportXlsxBtn.disabled = true;
            exportCsvBtn.disabled = true;
            statusEl.textContent = "导出中...";

            try {
                const fd = new FormData();
                fd.append("file", file);
                fd.append("column_name", columnName);
                fd.append("fmt", fmt);

                const resp = await fetch(`{{ url_for('wcnr_9lbq.export_query_result') }}`, {
                    method: "POST",
                    body: fd,
                });

                if (!resp.ok) {
                    let message = "导出失败";
                    try {
                        const errData = await resp.json();
                        message = errData.message || message;
                    } catch (_ignore) {
                        // ignore non-json error body
                    }
                    throw new Error(message);
                }

                const blob = await resp.blob();
                const fallback = `未成年人九类标签${Date.now()}.${fmt}`;
                const filename = parseDownloadName(resp.headers.get("Content-Disposition"), fallback);

                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);

                statusEl.textContent = `导出完成: ${filename}`;
            } catch (e) {
                errEl.textContent = e.message || String(e);
                statusEl.textContent = "";
            } finally {
                exportBtn.disabled = false;
                exportXlsxBtn.disabled = false;
                exportCsvBtn.disabled = false;
            }
        }

        async function query() {
            errEl.textContent = "";
            statusEl.textContent = "";

            const file = fileEl.files && fileEl.files[0];
            const columnName = String(colEl.value || "").trim();
            if (!file) {
                errEl.textContent = "请先上传文件";
                return;
            }
            if (!columnName) {
                errEl.textContent = "请输入身份证列名";
                return;
            }

            queryBtn.disabled = true;
            statusEl.textContent = "查询中...";
            try {
                const fd = new FormData();
                fd.append("file", file);
                fd.append("column_name", columnName);

                const resp = await fetch(`{{ url_for('wcnr_9lbq.api_query') }}`, {
                    method: "POST",
                    body: fd,
                });
                const data = await resp.json();
                if (!data.success) throw new Error(data.message || "查询失败");

                allRows = data.rows || [];
                currentPage = 1;
                renderTable();

                const info = data.extract_info || {};
                statusEl.textContent =
                    `提取: 源数据行数 ${info["源数据行数"] || 0}，非空身份证 ${info["非空身份证数"] || 0}，` +
                    `有效18位 ${info["有效18位身份证数"] || 0}，无效 ${info["无效身份证数"] || 0}，` +
                    `去重后 ${info["去重后身份证数"] || 0}；查询结果 ${data.total || 0} 条`;
            } catch (e) {
                errEl.textContent = e.message || String(e);
                allRows = [];
                currentPage = 1;
                renderTable();
                statusEl.textContent = "";
            } finally {
                queryBtn.disabled = false;
            }
        }

        function closeExportMenu() {
            exportMenu.classList.remove("show");
        }

        queryBtn.addEventListener("click", (e) => {
            e.preventDefault();
            query();
        });
        tplBtn.addEventListener("click", (e) => {
            e.preventDefault();
            window.location.href = `{{ url_for('wcnr_9lbq.download_template') }}`;
        });
        exportBtn.addEventListener("click", (e) => {
            e.preventDefault();
            exportMenu.classList.toggle("show");
        });
        exportXlsxBtn.addEventListener("click", (e) => {
            e.preventDefault();
            closeExportMenu();
            exportResult("xlsx");
        });
        exportCsvBtn.addEventListener("click", (e) => {
            e.preventDefault();
            closeExportMenu();
            exportResult("csv");
        });
        document.addEventListener("click", (e) => {
            if (!exportWrap.contains(e.target)) {
                closeExportMenu();
            }
        });

        pageSizeEl.addEventListener("change", () => {
            currentPage = 1;
            renderTable();
        });
        prevBtn.addEventListener("click", (e) => {
            e.preventDefault();
            if (currentPage > 1) currentPage -= 1;
            renderTable();
        });
        nextBtn.addEventListener("click", (e) => {
            e.preventDefault();
            currentPage += 1;
            renderTable();
        });

        renderTable();
    })();
</script>
