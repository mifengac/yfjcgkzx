<section class="card" style="margin-top: 12px;">
    <div class="row" style="justify-content:space-between; align-items:center;">
        <div class="row" style="gap:10px;">
            <label>开始时间
                <input type="datetime-local" id="jzqkStart" step="1">
            </label>
            <label>结束时间
                <input type="datetime-local" id="jzqkEnd" step="1">
            </label>
            <label>类型
                <div class="multi-select" id="jzqkTypesMs">
                    <div class="multi-select-display" id="jzqkTypesDisplay">加载中...</div>
                    <div class="multi-select-dropdown" id="jzqkTypesDropdown"></div>
                </div>
            </label>
            <button class="btn" id="jzqkQueryBtn">查询</button>
        </div>
        <div class="row" style="gap:10px; align-items:center;">
            <div class="dropdown" id="jzqkExportDd">
                <button class="btn" id="jzqkExportBtn">导出</button>
                <div class="dropdown-menu">
                    <a href="#" data-fmt="xlsx">导出 xlsx</a>
                    <a href="#" data-fmt="csv">导出 csv</a>
                </div>
            </div>
            <div class="dropdown" id="jzqkExportDetailDd">
                <button class="btn" id="jzqkExportDetailBtn" style="background:#ff9800;">导出详情</button>
                <div class="dropdown-menu">
                    <a href="#" data-fmt="xlsx">导出 xlsx</a>
                    <a href="#" data-fmt="csv">导出 csv</a>
                </div>
            </div>
        </div>
    </div>
    <div class="muted" id="jzqkStatus" style="margin-top:10px;"></div>
    <div class="err" id="jzqkErr" style="margin-top:10px;"></div>
</section>

<section class="card">
    <div class="table-wrap">
        <table id="jzqkTbl"></table>
    </div>
</section>

<style>
    #jzqkTbl th { text-align: center; }
    #jzqkTbl td.num-cell { text-align: center; font-variant-numeric: tabular-nums; }
    #jzqkTbl td.rowh { text-align: left; }
    #jzqkTbl tr.total-row td { background: #fff7e6; font-weight: 800; }
    #jzqkTbl tr.total-row td { border-top: 2px solid #ffe0b2; }
</style>

<script>
    (function() {
        const DEFAULT_COLS = [];

        const startEl = document.getElementById("jzqkStart");
        const endEl = document.getElementById("jzqkEnd");
        const statusEl = document.getElementById("jzqkStatus");
        const errEl = document.getElementById("jzqkErr");
        const tbl = document.getElementById("jzqkTbl");
        const queryBtn = document.getElementById("jzqkQueryBtn");

        let lastMeta = null;

        const jzqkBusyMask = document.getElementById("jzqkBusyMask");
        const jzqkBusyText = document.getElementById("jzqkBusyText");
        let _busyTimer = null;
        function setBusy(isBusy, text) {
            if (!jzqkBusyMask) return;
            if (isBusy) {
                if (_busyTimer) { clearTimeout(_busyTimer); _busyTimer = null; }
                if (jzqkBusyText) jzqkBusyText.textContent = text || "处理中，请稍候...";
                jzqkBusyMask.style.display = "flex";
                document.body.style.overflow = "hidden";
            } else {
                jzqkBusyMask.style.display = "none";
                document.body.style.overflow = "";
            }
        }

        // 导出按钮下拉
        const exportDd = document.getElementById("jzqkExportDd");
        const exportBtn = document.getElementById("jzqkExportBtn");
        exportBtn.addEventListener("click", (e) => {
            e.preventDefault();
            exportDd.classList.toggle("open");
        });
        exportDd.querySelectorAll(".dropdown-menu a").forEach(a => {
            a.addEventListener("click", (e) => {
                e.preventDefault();
                const fmt = a.getAttribute("data-fmt") || "xlsx";
                doExport(fmt);
                exportDd.classList.remove("open");
            });
        });
        document.addEventListener("click", (e) => { if (!exportDd.contains(e.target)) exportDd.classList.remove("open"); });

        // 导出详情按钮下拉
        const exportDetailDd = document.getElementById("jzqkExportDetailDd");
        const exportDetailBtn = document.getElementById("jzqkExportDetailBtn");
        exportDetailBtn.addEventListener("click", (e) => {
            e.preventDefault();
            exportDetailDd.classList.toggle("open");
        });
        exportDetailDd.querySelectorAll(".dropdown-menu a").forEach(a => {
            a.addEventListener("click", (e) => {
                e.preventDefault();
                const fmt = a.getAttribute("data-fmt") || "xlsx";
                doExportDetail(fmt);
                exportDetailDd.classList.remove("open");
            });
        });
        document.addEventListener("click", (e) => { if (!exportDetailDd.contains(e.target)) exportDetailDd.classList.remove("open"); });

        // 类型多选
        const ms = document.getElementById("jzqkTypesMs");
        const msDisplay = document.getElementById("jzqkTypesDisplay");
        const msDropdown = document.getElementById("jzqkTypesDropdown");

        function selectedTypes() {
            const boxes = Array.from(msDropdown.querySelectorAll('input[type="checkbox"]'));
            return boxes.filter(b => b.value !== "_all" && b.checked).map(b => b.value);
        }
        function syncAllBox() {
            const allBox = msDropdown.querySelector('input[value="_all"]');
            if (!allBox) return;
            const boxes = Array.from(msDropdown.querySelectorAll('input[type="checkbox"]')).filter(b => b.value !== "_all");
            const allChecked = boxes.length > 0 && boxes.every(b => b.checked);
            const noneChecked = boxes.length > 0 && boxes.every(b => !b.checked);
            allBox.checked = allChecked;
            allBox.indeterminate = !allChecked && !noneChecked;
        }
        function renderMsLabel() {
            const boxes = Array.from(msDropdown.querySelectorAll('input[type="checkbox"]')).filter(b => b.value !== "_all");
            const sel = selectedTypes();
            if (boxes.length === 0) { msDisplay.textContent = "无类型"; return; }
            if (sel.length === 0) { msDisplay.textContent = "未选择(默认全量)"; return; }
            if (sel.length === boxes.length) { msDisplay.textContent = "全部"; return; }
            msDisplay.textContent = `已选 ${sel.length} 项`;
        }
        function openMs() { msDropdown.classList.add("open"); }
        function closeMs() { msDropdown.classList.remove("open"); }
        msDisplay.addEventListener("click", (e) => {
            e.stopPropagation();
            if (msDropdown.classList.contains("open")) closeMs(); else openMs();
        });
        msDropdown.addEventListener("click", (e) => e.stopPropagation());
        document.addEventListener("click", () => closeMs());
        msDropdown.addEventListener("change", (e) => {
            const t = e.target;
            if (!t || t.tagName !== "INPUT") return;
            if (t.value === "_all") {
                const boxes = Array.from(msDropdown.querySelectorAll('input[type="checkbox"]')).filter(b => b.value !== "_all");
                boxes.forEach(b => b.checked = t.checked);
            } else {
                syncAllBox();
            }
            renderMsLabel();
        });

        async function loadTypes() {
            msDropdown.innerHTML = '<div class="muted" style="padding:8px;">加载中...</div>';
            const resp = await fetch("{{ url_for('jzqk_tongji.api_leixing') }}");
            const data = await resp.json();
            if (!data.success) throw new Error(data.message || "加载类型失败");
            const items = data.data || [];
            const html = [];
            html.push('<label class="multi-select-option"><input type="checkbox" value="_all"><span>全选</span></label>');
            for (const x of items) {
                const s = String(x || "").trim();
                if (!s) continue;
                html.push(`<label class="multi-select-option"><input type="checkbox" value="${s.replace(/"/g, '&quot;')}"><span>${s}</span></label>`);
            }
            msDropdown.innerHTML = html.join("");
            syncAllBox();
            renderMsLabel();
        }

        function formatDateTimeLocal(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`;
        }
        function formatDateTime(v) {
            if (!v) return "";
            const raw = String(v).trim();
            let s = raw.includes("T") ? raw.replace("T", " ") : raw;
            if (s.length === 16) s = s + ":00";
            if (s.length > 19) s = s.slice(0, 19);
            return s;
        }
        function setDefaultTimeRange() {
            const now = new Date();
            const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            const start = new Date(today0);
            start.setDate(start.getDate() - 7);
            const end = new Date(today0);
            startEl.value = formatDateTimeLocal(start);
            endEl.value = formatDateTimeLocal(end);
        }

        function buildQueryParams(metaOverride) {
            const st = (metaOverride && metaOverride.start_time) ? metaOverride.start_time : formatDateTime(startEl.value);
            const et = (metaOverride && metaOverride.end_time) ? metaOverride.end_time : formatDateTime(endEl.value);
            const types = selectedTypes();
            const usp = new URLSearchParams();
            if (st) usp.set("start_time", st);
            if (et) usp.set("end_time", et);
            for (const t of types) usp.append("leixing", t);
            return usp;
        }

        function renderTable(rows, columns) {
            const cols = (Array.isArray(columns) && columns.length)
                ? columns
                : ((rows && rows.length) ? Object.keys(rows[0]) : DEFAULT_COLS);
            const thead = cols.length
                ? `<thead><tr>${cols.map(c => `<th>${c}</th>`).join("")}</tr></thead>`
                : `<thead><tr><th>无数据</th></tr></thead>`;
            const tbodyRows = (rows || []).map(r => {
                const diquName = r["地区"] || "";
                const rowClass = (diquName === "全市") ? "total-row" : "";
                const tds = cols.map(c => {
                    if (c === "地区") return `<td class="rowh">${diquName}</td>`;
                    const v = (r[c] == null) ? 0 : r[c];
                    return `<td class="num-cell">${v || 0}</td>`;
                });
                return `<tr class="${rowClass}">${tds.join("")}</tr>`;
            }).join("");
            const emptyColspan = Math.max(cols.length, 1);
            tbl.innerHTML = thead + `<tbody>${tbodyRows || `<tr><td colspan="${emptyColspan}" class="muted">无数据</td></tr>`}</tbody>`;
        }

        async function query() {
            errEl.textContent = "";
            statusEl.textContent = "";
            queryBtn.disabled = true;
            setBusy(true, "正在查询中，请稍候...");
            try {
                const usp = buildQueryParams();
                const resp = await fetch(`{{ url_for('jzqk_tongji.api_summary') }}?` + usp.toString());
                const data = await resp.json();
                if (!data.success) throw new Error(data.message || "查询失败");
                statusEl.textContent = `当前统计时间段：${data.meta.start_time} ~ ${data.meta.end_time}`;
                lastMeta = data.meta || null;
                renderTable(data.rows || [], data.columns || DEFAULT_COLS);
            } catch (e) {
                errEl.textContent = e.message || String(e);
                statusEl.textContent = "";
            } finally {
                queryBtn.disabled = false;
                setBusy(false);
            }
        }

        function doExport(fmt) {
            const usp = buildQueryParams();
            usp.set("fmt", fmt);
            const href = `{{ url_for('jzqk_tongji.export_summary') }}?` + usp.toString();
            setBusy(true, "正在导出中，请稍候...");
            _busyTimer = setTimeout(() => setBusy(false), 4000);
            window.location.href = href;
        }

        function doExportDetail(fmt) {
            const usp = buildQueryParams();
            usp.set("fmt", fmt);
            const href = `{{ url_for('jzqk_tongji.export_detail') }}?` + usp.toString();
            setBusy(true, "正在导出详情中，请稍候...");
            _busyTimer = setTimeout(() => setBusy(false), 4000);
            window.location.href = href;
        }

        queryBtn.addEventListener("click", (e) => { e.preventDefault(); query(); });

        setDefaultTimeRange();

        loadTypes().catch(e => {
            errEl.textContent = e.message || String(e);
            msDisplay.textContent = "加载失败";
        });
    })();
</script>

<div id="jzqkBusyMask" style="display:none; position:fixed; inset:0; z-index:2000; background:rgba(15,23,42,0.45); align-items:center; justify-content:center; pointer-events:all;">
    <div style="min-width:280px; padding:18px 20px; border-radius:12px; background:#fff; box-shadow:0 12px 30px rgba(0,0,0,.2); display:flex; align-items:center; gap:10px; font-size:14px; font-weight:700; color:#1f2937;">
        <span style="width:12px; height:12px; border-radius:50%; background:#1976d2; animation:jqaj-pulse 1s ease-in-out infinite; display:inline-block;"></span>
        <span id="jzqkBusyText">处理中，请稍候...</span>
    </div>
</div>
