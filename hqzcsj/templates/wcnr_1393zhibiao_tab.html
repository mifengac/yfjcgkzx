<section class="card" style="margin-top: 12px;">
    <div class="row" style="justify-content:space-between; align-items:center;">
        <div class="row" style="gap:10px;">
            <label>开始时间
                <input type="datetime-local" id="wcnr1393Start" step="1">
            </label>
            <label>结束时间
                <input type="datetime-local" id="wcnr1393End" step="1">
            </label>
            <label>类型
                <div class="multi-select" id="wcnr1393TypesMs">
                    <div class="multi-select-display" id="wcnr1393TypesDisplay">加载中...</div>
                    <div class="multi-select-dropdown" id="wcnr1393TypesDropdown"></div>
                </div>
            </label>
            <button class="btn" id="wcnr1393QueryBtn">查询</button>
        </div>
        <div class="row" style="gap:10px; align-items:center;">
            <div class="dropdown" id="wcnr1393ExportDd">
                <button class="btn" id="wcnr1393ExportBtn">导出</button>
                <div class="dropdown-menu">
                    <a href="#" data-fmt="xlsx">导出 xlsx</a>
                    <a href="#" data-fmt="csv">导出 csv</a>
                </div>
            </div>
            <div class="dropdown" id="wcnr1393ExportDetailDd">
                <button class="btn" id="wcnr1393ExportDetailBtn" style="background:#ff9800;">导出详情</button>
                <div class="dropdown-menu">
                    <a href="#" data-fmt="xlsx">导出 xlsx</a>
                    <a href="#" data-fmt="csv">导出 csv(zip)</a>
                </div>
            </div>
        </div>
    </div>
    <div class="muted" id="wcnr1393Status" style="margin-top:10px;"></div>
    <div class="err" id="wcnr1393Err" style="margin-top:10px;"></div>
</section>

<section class="card">
    <div class="table-wrap">
        <table id="wcnr1393Tbl"></table>
    </div>
</section>

<style>
    #wcnr1393Tbl th { text-align: center; }
    #wcnr1393Tbl td.num-cell { text-align: center; font-variant-numeric: tabular-nums; }
    #wcnr1393Tbl td.rowh { text-align: left; }
    #wcnr1393Tbl tr.total-row td { background: #fff7e6; font-weight: 800; }
    #wcnr1393Tbl tr.total-row td { border-top: 2px solid #ffe0b2; }
    #wcnr1393Tbl a { color: #1976d2; text-decoration: none; font-weight: 700; }
    #wcnr1393Tbl a:hover { text-decoration: underline; }
</style>

<script>
    (function() {
        const COLS = [
            "地区",
            "违法犯罪未成年人",
            "结业后再犯数(犯罪)",
            "结业后再犯数(违法犯罪)",
            "未成年人场所被侵害发案数",
            "未成年人被侵害发案数",
            "严重不良未成年人矫治教育覆盖率",
            "适用专门（矫治）教育情形送矫率",
            "责令加强监护率"
        ];

        const METRIC_MAP = {
            "违法犯罪未成年人": "wfzf",
            "结业后再犯数(犯罪)": "jyh_cf",
            "结业后再犯数(违法犯罪)": "jyh_wfzf",
            "未成年人场所被侵害发案数": "cs_bqh",
            "未成年人被侵害发案数": "bqh",
            "严重不良未成年人矫治教育覆盖率": "yzbl_cover",
            "适用专门（矫治）教育情形送矫率": "syzmj_songjiao",
            "责令加强监护率": "zljqjh_rate",
        };

        const startEl = document.getElementById("wcnr1393Start");
        const endEl = document.getElementById("wcnr1393End");
        const statusEl = document.getElementById("wcnr1393Status");
        const errEl = document.getElementById("wcnr1393Err");
        const tbl = document.getElementById("wcnr1393Tbl");
        const queryBtn = document.getElementById("wcnr1393QueryBtn");

        let lastMeta = null;

        // 导出按钮下拉
        const exportDd = document.getElementById("wcnr1393ExportDd");
        const exportBtn = document.getElementById("wcnr1393ExportBtn");
        exportBtn.addEventListener("click", (e) => {
            e.preventDefault();
            exportDd.classList.toggle("open");
        });
        exportDd.querySelectorAll(".dropdown-menu a").forEach(a => {
            a.addEventListener("click", (e) => {
                e.preventDefault();
                const fmt = a.getAttribute("data-fmt") || "xlsx";
                doExport(fmt);
                exportDd.classList.remove("open");
            });
        });
        document.addEventListener("click", (e) => { if (!exportDd.contains(e.target)) exportDd.classList.remove("open"); });

        // 导出详情按钮下拉
        const exportDetailDd = document.getElementById("wcnr1393ExportDetailDd");
        const exportDetailBtn = document.getElementById("wcnr1393ExportDetailBtn");
        exportDetailBtn.addEventListener("click", (e) => {
            e.preventDefault();
            exportDetailDd.classList.toggle("open");
        });
        exportDetailDd.querySelectorAll(".dropdown-menu a").forEach(a => {
            a.addEventListener("click", (e) => {
                e.preventDefault();
                const fmt = a.getAttribute("data-fmt") || "xlsx";
                doExportDetail(fmt);
                exportDetailDd.classList.remove("open");
            });
        });
        document.addEventListener("click", (e) => { if (!exportDetailDd.contains(e.target)) exportDetailDd.classList.remove("open"); });

        // 类型多选
        const ms = document.getElementById("wcnr1393TypesMs");
        const msDisplay = document.getElementById("wcnr1393TypesDisplay");
        const msDropdown = document.getElementById("wcnr1393TypesDropdown");
        function selectedTypes() {
            const boxes = Array.from(msDropdown.querySelectorAll('input[type="checkbox"]'));
            return boxes
                .filter(b => b.value !== "_all" && b.checked)
                .map(b => b.value);
        }
        function syncAllBox() {
            const allBox = msDropdown.querySelector('input[value="_all"]');
            if (!allBox) return;
            const boxes = Array.from(msDropdown.querySelectorAll('input[type="checkbox"]')).filter(b => b.value !== "_all");
            const allChecked = boxes.length > 0 && boxes.every(b => b.checked);
            const noneChecked = boxes.length > 0 && boxes.every(b => !b.checked);
            allBox.checked = allChecked;
            allBox.indeterminate = !allChecked && !noneChecked;
        }
        function renderMsLabel() {
            const boxes = Array.from(msDropdown.querySelectorAll('input[type="checkbox"]')).filter(b => b.value !== "_all");
            const sel = selectedTypes();
            if (boxes.length === 0) { msDisplay.textContent = "无类型"; return; }
            if (sel.length === 0) { msDisplay.textContent = "未选择(默认全量)"; return; }
            if (sel.length === boxes.length) { msDisplay.textContent = "全部"; return; }
            msDisplay.textContent = `已选 ${sel.length} 项`;
        }
        function openMs() { msDropdown.classList.add("open"); }
        function closeMs() { msDropdown.classList.remove("open"); }
        msDisplay.addEventListener("click", (e) => {
            e.stopPropagation();
            if (msDropdown.classList.contains("open")) closeMs(); else openMs();
        });
        msDropdown.addEventListener("click", (e) => e.stopPropagation());
        document.addEventListener("click", () => closeMs());
        msDropdown.addEventListener("change", (e) => {
            const t = e.target;
            if (!t || t.tagName !== "INPUT") return;
            if (t.value === "_all") {
                const boxes = Array.from(msDropdown.querySelectorAll('input[type="checkbox"]')).filter(b => b.value !== "_all");
                boxes.forEach(b => b.checked = t.checked);
            } else {
                syncAllBox();
            }
            renderMsLabel();
        });

        async function loadTypes() {
            msDropdown.innerHTML = '<div class="muted" style="padding:8px;">加载中...</div>';
            const resp = await fetch("{{ url_for('wcnr_1393zhibiao.api_leixing') }}");
            const data = await resp.json();
            if (!data.success) throw new Error(data.message || "加载类型失败");
            const items = data.data || [];
            const html = [];
            html.push('<label class="multi-select-option"><input type="checkbox" value="_all"><span>全选</span></label>');
            for (const x of items) {
                const s = String(x || "").trim();
                if (!s) continue;
                html.push(`<label class="multi-select-option"><input type="checkbox" value="${s.replace(/"/g, '&quot;')}"><span>${s}</span></label>`);
            }
            msDropdown.innerHTML = html.join("");
            syncAllBox();
            renderMsLabel();
        }

        function formatDateTimeLocal(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`;
        }
        function formatDateTime(v) {
            if (!v) return "";
            const raw = String(v).trim();
            let s = raw.includes("T") ? raw.replace("T", " ") : raw;
            if (s.length === 16) s = s + ":00";
            if (s.length > 19) s = s.slice(0, 19);
            return s;
        }
        function setDefaultTimeRange() {
            const now = new Date();
            const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            const start = new Date(today0);
            start.setDate(start.getDate() - 7);
            const end = new Date(today0);
            startEl.value = formatDateTimeLocal(start);
            endEl.value = formatDateTimeLocal(end);
        }

        function buildQueryParams(metaOverride) {
            const st = (metaOverride && metaOverride.start_time) ? metaOverride.start_time : formatDateTime(startEl.value);
            const et = (metaOverride && metaOverride.end_time) ? metaOverride.end_time : formatDateTime(endEl.value);
            const types = selectedTypes();
            const usp = new URLSearchParams();
            if (st) usp.set("start_time", st);
            if (et) usp.set("end_time", et);
            for (const t of types) usp.append("leixing", t);
            return usp;
        }

        function renderTable(rows, meta) {
            const thead = `<thead><tr>${COLS.map(c => `<th>${c}</th>`).join("")}</tr></thead>`;
            const detailBase = "{{ url_for('wcnr_1393zhibiao.detail_page') }}";

            const tbodyRows = (rows || []).map(r => {
                const diquName = r["地区"] || "";
                const diquCode = r["__diqu_code"] || "";
                const rowClass = (diquName === "全市") ? "total-row" : "";
                const tds = COLS.map(c => {
                    if (c === "地区") return `<td class="rowh">${diquName}</td>`;
                    const v = (r[c] == null) ? 0 : r[c];
                    const metric = METRIC_MAP[c];
                    const usp = buildQueryParams(meta);
                    usp.set("metric", metric);
                    usp.set("diqu", diquCode || "ALL");
                    const href = `${detailBase}?` + usp.toString();
                    return `<td class="num-cell"><a href="${href}" target="_blank" rel="noopener">${v || 0}</a></td>`;
                });
                return `<tr class="${rowClass}">${tds.join("")}</tr>`;
            }).join("");
            tbl.innerHTML = thead + `<tbody>${tbodyRows || `<tr><td colspan="${COLS.length}" class="muted">无数据</td></tr>`}</tbody>`;
        }

        async function query() {
            errEl.textContent = "";
            statusEl.textContent = "查询中...";
            queryBtn.disabled = true;
            try {
                const usp = buildQueryParams();
                const resp = await fetch(`{{ url_for('wcnr_1393zhibiao.api_summary') }}?` + usp.toString());
                const data = await resp.json();
                if (!data.success) throw new Error(data.message || "查询失败");
                statusEl.textContent = `当前统计时间段：${data.meta.start_time} ~ ${data.meta.end_time}`;
                lastMeta = data.meta || null;
                renderTable(data.rows || [], data.meta || {});
            } catch (e) {
                errEl.textContent = e.message || String(e);
                statusEl.textContent = "";
            } finally {
                queryBtn.disabled = false;
            }
        }

        function doExport(fmt) {
            const usp = buildQueryParams(lastMeta);
            usp.set("fmt", fmt);
            const href = `{{ url_for('wcnr_1393zhibiao.export_summary') }}?` + usp.toString();
            window.location.href = href;
        }

        function doExportDetail(fmt) {
            const usp = buildQueryParams(lastMeta);
            usp.set("fmt", fmt);
            const href = `{{ url_for('wcnr_1393zhibiao.export_detail') }}?` + usp.toString();
            window.location.href = href;
        }

        queryBtn.addEventListener("click", (e) => { e.preventDefault(); query(); });

        setDefaultTimeRange();

        let hasAutoQueried = false;
        const typesLoaded = loadTypes().catch(e => {
            errEl.textContent = e.message || String(e);
            msDisplay.textContent = "加载失败";
            throw e;
        });

        async function maybeAutoQuery() {
            if (hasAutoQueried) return;
            hasAutoQueried = true;
            await typesLoaded;
            await query();
        }

        const tabBtn = document.querySelector('#hqzcsjTabs .tab-btn[data-tab="wcnr1393"]');
        if (tabBtn) {
            tabBtn.addEventListener("click", () => maybeAutoQuery().catch(() => {}));
        }
        const panel = document.getElementById("tab-wcnr1393");
        if (panel && panel.classList.contains("active")) {
            maybeAutoQuery().catch(() => {});
        }
    })();
</script>
