<section class="card" style="margin-top: 12px;">
    <div class="row" style="justify-content:space-between; align-items:center;">
        <div class="row" style="gap:10px;">
            <label>开始时间
                <input type="datetime-local" id="pcsjqajtjStart" step="1">
            </label>
            <label>结束时间
                <input type="datetime-local" id="pcsjqajtjEnd" step="1">
            </label>
            <label>环比开始
                <input type="datetime-local" id="pcsjqajtjHbStart" step="1">
            </label>
            <label>环比结束
                <input type="datetime-local" id="pcsjqajtjHbEnd" step="1">
            </label>
            <label>分局
                <div class="multi-select" id="pcsjqajtjFenjuMs">
                    <div class="multi-select-display" id="pcsjqajtjFenjuDisplay">加载中...</div>
                    <div class="multi-select-dropdown" id="pcsjqajtjFenjuDropdown"></div>
                </div>
            </label>
            <label>类型
                <div class="multi-select" id="pcsjqajtjTypesMs">
                    <div class="multi-select-display" id="pcsjqajtjTypesDisplay">加载中...</div>
                    <div class="multi-select-dropdown" id="pcsjqajtjTypesDropdown"></div>
                </div>
            </label>
            <button class="btn" id="pcsjqajtjQueryBtn">查询</button>
        </div>
        <div class="row" style="gap:10px; align-items:center;">
            <label class="ratio-switch" title="显示环比列">
                <span class="ratio-switch-text">显示环比</span>
                <input type="checkbox" id="pcsjqajtjShowHb">
                <span class="ratio-switch-slider"></span>
            </label>
            <label class="ratio-switch" title="显示同比比例列">
                <span class="ratio-switch-text">显示比例</span>
                <input type="checkbox" id="pcsjqajtjShowRatio">
                <span class="ratio-switch-slider"></span>
            </label>
            <div class="dropdown" id="pcsjqajtjExportDd">
                <button class="btn" id="pcsjqajtjExportBtn">导出</button>
                <div class="dropdown-menu">
                    <a href="#" data-fmt="xlsx">导出 xlsx</a>
                    <a href="#" data-fmt="csv">导出 csv</a>
                </div>
            </div>
        </div>
    </div>
    <div class="muted" id="pcsjqajtjStatus" style="margin-top:10px;"></div>
    <div class="err" id="pcsjqajtjErr" style="margin-top:10px;"></div>
</section>

<section class="card">
    <div class="table-wrap">
        <table id="pcsjqajtjTbl"></table>
    </div>
</section>

<style>
    #pcsjqajtjTbl th { text-align: center; }
    #pcsjqajtjTbl td.num-cell { text-align: center; font-variant-numeric: tabular-nums; }
    #pcsjqajtjTbl td.rowh { text-align: left; }
    #pcsjqajtjTbl td.rate-cell { white-space: nowrap; }

    .ratio-switch {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
    }
    .ratio-switch input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
    }
    .ratio-switch-slider {
        position: relative;
        width: 42px;
        height: 22px;
        border-radius: 999px;
        background: #c6ccd6;
        transition: background .2s ease;
    }
    .ratio-switch-slider::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 3px rgba(0,0,0,.22);
        transition: transform .2s ease;
    }
    .ratio-switch input:checked + .ratio-switch-slider {
        background: #1e88e5;
    }
    .ratio-switch input:checked + .ratio-switch-slider::after {
        transform: translateX(20px);
    }

    .pcsjqajtj-busy-mask {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 2000;
        background: rgba(15, 23, 42, 0.45);
        align-items: center;
        justify-content: center;
        pointer-events: all;
    }
    .pcsjqajtj-busy-mask.active {
        display: flex;
    }
    .pcsjqajtj-busy-card {
        min-width: 280px;
        padding: 18px 20px;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 700;
        color: #1f2937;
    }
    .pcsjqajtj-busy-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #1976d2;
        animation: pcsjqajtj-pulse 1s ease-in-out infinite;
    }
    @keyframes pcsjqajtj-pulse {
        0%, 100% { transform: scale(0.75); opacity: 0.55; }
        50% { transform: scale(1); opacity: 1; }
    }
</style>

<div id="pcsjqajtjDetailModal" class="modal" onclick="pcsjqajtjCloseModal(event)" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index: 80; align-items:center; justify-content:center; padding: 16px;">
    <div class="modal-content" onclick="event.stopPropagation()" style="width:min(1200px, 96vw); height:min(860px, 92vh); background:#fff; border-radius:14px; box-shadow:0 14px 40px rgba(0,0,0,.18); border:1px solid #e6e8ef; overflow:hidden; display:flex; flex-direction:column;">
        <div class="modal-header" style="padding:12px 14px; border-bottom:1px solid #eef0f6; display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:800;">明细数据</div>
            <button type="button" class="btn secondary" onclick="pcsjqajtjCloseModal()" style="background:#555;">关闭</button>
        </div>
        <div class="modal-body" style="flex:1;">
            <iframe id="pcsjqajtjDetailFrame" title="明细数据" style="width:100%; height:100%; border:0;"></iframe>
        </div>
    </div>
</div>

<div id="pcsjqajtjBusyMask" class="pcsjqajtj-busy-mask" aria-live="polite" aria-busy="true">
    <div class="pcsjqajtj-busy-card">
        <span class="pcsjqajtj-busy-dot"></span>
        <span id="pcsjqajtjBusyText">处理中，请稍候...</span>
    </div>
</div>
