<section class="card" style="margin-top: 12px;">
    <div class="row" style="justify-content:space-between; align-items:center;">
        <div class="row" style="gap:10px;">
            <label>开始时间
                <input type="datetime-local" id="wcnrStart" step="1">
            </label>
            <label>结束时间
                <input type="datetime-local" id="wcnrEnd" step="1">
            </label>
            <label>环比开始
                <input type="datetime-local" id="wcnrHbStart" step="1">
            </label>
            <label>环比结束
                <input type="datetime-local" id="wcnrHbEnd" step="1">
            </label>
            <label>类型
                <div class="multi-select" id="wcnrTypesMs">
                    <div class="multi-select-display" id="wcnrTypesDisplay">加载中...</div>
                    <div class="multi-select-dropdown" id="wcnrTypesDropdown"></div>
                </div>
            </label>
            <label>治安处罚类型
                <div class="multi-select" id="wcnrZaMs">
                    <div class="multi-select-display" id="wcnrZaDisplay">未选择(默认全量)</div>
                    <div class="multi-select-dropdown" id="wcnrZaDropdown"></div>
                </div>
            </label>
            <button class="btn" id="wcnrQueryBtn">查询</button>
        </div>
        <div class="row" style="gap:10px; align-items:center;">
            <label class="ratio-switch" title="显示环比列">
                <span class="ratio-switch-text">显示环比</span>
                <input type="checkbox" id="wcnrShowHb">
                <span class="ratio-switch-slider"></span>
            </label>
            <label class="ratio-switch" title="显示同比比例列">
                <span class="ratio-switch-text">显示比例</span>
                <input type="checkbox" id="wcnrShowRatio">
                <span class="ratio-switch-slider"></span>
            </label>
            <div class="dropdown" id="wcnrExportDd">
                <button class="btn" id="wcnrExportBtn">导出</button>
                <div class="dropdown-menu">
                    <a href="#" data-fmt="xlsx">导出 xlsx</a>
                    <a href="#" data-fmt="csv">导出 csv</a>
                </div>
            </div>
            <div class="dropdown" id="wcnrReportDd">
                <button class="btn" id="wcnrReportBtn" style="background:#ff9800;">导出报表</button>
                <div class="dropdown-menu">
                    <a href="#" data-fmt="xlsx">导出 xlsx</a>
                    <a href="#" data-fmt="csv">导出 csv</a>
                </div>
            </div>
            <button class="btn" id="wcnrExportAllBtn" style="background:#ff9800;">导出详细(xlsx)</button>
        </div>
    </div>
    <div class="muted" id="wcnrStatus" style="margin-top:10px;"></div>
    <div class="err" id="wcnrErr" style="margin-top:10px;"></div>
</section>

<section class="card">
    <div class="table-wrap">
        <table id="wcnrTbl"></table>
    </div>
</section>

<style>
    #wcnrTbl th { text-align: center; }
    #wcnrTbl td.num-cell { text-align: center; font-variant-numeric: tabular-nums; }
    #wcnrTbl td.rowh { text-align: left; }
    #wcnrTbl td.ratio-cell { white-space: nowrap; }
    #wcnrTbl tr.total-row td { background: #fff7e6; font-weight: 800; }
    #wcnrTbl tr.total-row td { border-top: 2px solid #ffe0b2; }

    .ratio-switch {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
    }
    .ratio-switch input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
    }
    .ratio-switch-slider {
        position: relative;
        width: 42px;
        height: 22px;
        border-radius: 999px;
        background: #c6ccd6;
        transition: background .2s ease;
    }
    .ratio-switch-slider::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 3px rgba(0,0,0,.22);
        transition: transform .2s ease;
    }
    .ratio-switch input:checked + .ratio-switch-slider {
        background: #1e88e5;
    }
    .ratio-switch input:checked + .ratio-switch-slider::after {
        transform: translateX(20px);
    }

    .wcnr-busy-mask {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 2000;
        background: rgba(15, 23, 42, 0.45);
        align-items: center;
        justify-content: center;
        pointer-events: all;
    }
    .wcnr-busy-mask.active {
        display: flex;
    }
    .wcnr-busy-card {
        min-width: 280px;
        padding: 18px 20px;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 700;
        color: #1f2937;
    }
    .wcnr-busy-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #1976d2;
        animation: wcnr-pulse 1s ease-in-out infinite;
    }
    @keyframes wcnr-pulse {
        0%, 100% { transform: scale(0.75); opacity: 0.55; }
        50% { transform: scale(1); opacity: 1; }
    }
</style>

<div id="wcnrDetailModal" class="modal" onclick="wcnrCloseModal(event)" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index: 80; align-items:center; justify-content:center; padding: 16px;">
    <div class="modal-content" onclick="event.stopPropagation()" style="width:min(1200px, 96vw); height:min(860px, 92vh); background:#fff; border-radius:14px; box-shadow:0 14px 40px rgba(0,0,0,.18); border:1px solid #e6e8ef; overflow:hidden; display:flex; flex-direction:column;">
        <div class="modal-header" style="padding:12px 14px; border-bottom:1px solid #eef0f6; display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:800;">明细数据</div>
            <button type="button" class="btn secondary" onclick="wcnrCloseModal()" style="background:#555;">关闭</button>
        </div>
        <div class="modal-body" style="flex:1;">
            <iframe id="wcnrDetailFrame" title="明细数据" style="width:100%; height:100%; border:0;"></iframe>
        </div>
    </div>
</div>

<div id="wcnrBusyMask" class="wcnr-busy-mask" aria-live="polite" aria-busy="true">
    <div class="wcnr-busy-card">
        <span class="wcnr-busy-dot"></span>
        <span id="wcnrBusyText">报表生成中，请等待...</span>
    </div>
</div>
