<!-- 街面三类警情：地址分类 -->
<div id="jiemiansanlei-tab" class="tab-content" style="display: none;">
    <h3>街面三类警情</h3>

    <div class="date-range-container">
        <div class="date-inputs" style="flex-wrap: wrap;">
            <div style="min-width: 320px;">
                <label for="jiemiansanleiCaseTypes">警情性质:</label>
                <div id="jiemiansanleiCaseTypesMs" class="ms">
                    <button type="button" class="ms-btn" disabled>加载中...</button>
                </div>
            </div>

            <div>
                <label for="jiemiansanleiStartTime">开始时间:</label>
                <input type="datetime-local" id="jiemiansanleiStartTime" name="jiemiansanleiStartTime" value="">
            </div>
            <div>
                <label for="jiemiansanleiEndTime">结束时间:</label>
                <input type="datetime-local" id="jiemiansanleiEndTime" name="jiemiansanleiEndTime" value="">
            </div>

            <div style="min-width: 220px;">
                <label for="jiemiansanleiSources">警情性质口径:</label>
                <div id="jiemiansanleiSourcesMs" class="ms">
                    <button type="button" class="ms-btn" disabled>加载中...</button>
                </div>
            </div>

            <div style="display:flex; align-items:center; gap:10px;">
                <button class="calculate-btn" onclick="jiemiansanleiQuery()">查询</button>

                <div style="position: relative; display:inline-block;">
                    <button class="calculate-btn" onclick="toggleJiemiansanleiExportMenu()" style="background: #4CAF50;">导出</button>
                    <div id="jiemiansanleiExportMenu" style="display:none; position:absolute; top: 42px; left:0; background:#fff; border:1px solid #ddd; border-radius:4px; min-width:120px; z-index: 10;">
                        <a href="javascript:void(0)" onclick="jiemiansanleiExport('xls')" style="display:block; padding:8px 12px; text-decoration:none; color:#333;">xls</a>
                        <a href="javascript:void(0)" onclick="jiemiansanleiExport('xlsx')" style="display:block; padding:8px 12px; text-decoration:none; color:#333;">xlsx</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="date-inputs" style="align-items: center; flex-wrap: wrap;">
            <div>
                <label for="jiemiansanleiPageSize">每页:</label>
                <select id="jiemiansanleiPageSize" onchange="jiemiansanleiQuery(1)">
                    <option value="20" selected>20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="all">全部</option>
                </select>
            </div>
            <div id="jiemiansanleiPager" style="display:flex; gap:8px; align-items:center;">
                <button class="calculate-btn" onclick="jiemiansanleiPrevPage()" style="background:#757575;">上一页</button>
                <span id="jiemiansanleiPageInfo">第 1 页</span>
                <button class="calculate-btn" onclick="jiemiansanleiNextPage()" style="background:#757575;">下一页</button>
            </div>
        </div>
    </div>

    <div id="jiemiansanleiStatusMessage" class="status-message" style="display: none;"></div>

    <div id="jiemiansanleiProgressContainer" style="display: none;">
        <p>正在查询与分类...</p>
        <div class="progress-bar">
            <div class="progress-bar-fill" id="jiemiansanleiProgressBar"></div>
        </div>
        <p id="jiemiansanleiProgressText">0%</p>
    </div>

    <div class="result-container" id="jiemiansanleiResultContainer" style="display: none;">
        <h4>查询结果</h4>
        <div id="jiemiansanleiResultTable"></div>
    </div>
</div>
